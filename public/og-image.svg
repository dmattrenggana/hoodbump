<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- HoodBump logo centered -->
  <g transform="translate(600, 200)">
    <g transform="translate(-280, -120) scale(1.2)">
      <!-- Green arrow up-right -->
      <g transform="translate(60, 80)">
        <line x1="0" y1="50" x2="35" y2="50" stroke="#00ff00" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="68" x2="25" y2="68" stroke="#00ff00" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="86" x2="30" y2="86" stroke="#00ff00" stroke-width="6" stroke-linecap="round"/>
        <path d="M 40 80 L 130 -10" stroke="#00ff00" stroke-width="22" stroke-linecap="round"/>
        <path d="M 80 -10 L 130 -10 L 130 40 Z" fill="#00ff00"/>
      </g>
      <!-- Main lightning bolt -->
      <path d="M 230 80 L 320 230 L 270 230 L 330 350 L 200 220 L 250 220 Z" fill="#00ff00"/>
      <!-- Red arrow down-left -->
      <g transform="translate(390, 270)">
        <line x1="120" y1="50" x2="60" y2="50" stroke="#ff0040" stroke-width="6" stroke-linecap="round"/>
        <line x1="110" y1="68" x2="55" y2="68" stroke="#ff0040" stroke-width="6" stroke-linecap="round"/>
        <line x1="115" y1="86" x2="60" y2="86" stroke="#ff0040" stroke-width="6" stroke-linecap="round"/>
        <path d="M 0 0 L 60 130" stroke="#ff0040" stroke-width="22" stroke-linecap="round"/>
        <path d="M 20 80 L 60 130 L 10 130 Z" fill="#ff0040"/>
      </g>
    </g>
  </g>

  <!-- HoodBump title -->
  <text x="600" y="500"
        font-family="'Arial Black', sans-serif"
        font-size="120"
        font-weight="900"
        font-style="italic"
        fill="#c4ff00"
        text-anchor="middle"
        letter-spacing="-3">
    HoodBump
  </text>

  <!-- Subtitle -->
  <text x="600" y="565"
        font-family="'Helvetica', sans-serif"
        font-size="28"
        font-weight="500"
        fill="#888888"
        text-anchor="middle"
        letter-spacing="2">
    TRENDING BOT FOR ROBINHOOD CHAIN
  </text>
</svg>